<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alevi Sohbet & Evlilik</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="./style.css" />
  </head>

  <body>
    <script src="./config.js"></script>

    <div class="layout">

      <!-- SOL BAR -->
      <aside class="sidebar">
        <div class="brand">
          <div class="brand__logo">A</div>
          <div>
            <h1>Alevi Sohbet</h1>
            <p>Evlilik & Realtime Platform</p>
          </div>
        </div>

        <section class="panel">
          <div class="panel__title">Odalar</div>
          <div id="roomList" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel__title">Kullanıcılar</div>
          <input id="userSearch" class="input" type="text" placeholder="Kullanıcı ara..." />
          <div id="userList" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel__title">Engellenenler</div>
          <div id="blockedList" class="stack"></div>
        </section>

        <section class="profile-card">
          <img id="myAvatar" class="avatar" src="https://placehold.co/64x64" />
          <div class="profile-card__info">
            <div id="myUsername">@misafir</div>
            <div id="mySub">Giriş yapmadınız</div>
          </div>
          <button id="btnProfile" class="btn btn--ghost">Düzenle</button>
        </section>
      </aside>

      <!-- ORTA CHAT -->
      <main class="chat-shell">

        <header class="chat-header">
          <div>
            <h2># genel-sohbet</h2>
            <p>Alevi topluluğu canlı sohbet</p>
          </div>
        </header>

        <section class="chat-card">

          <!-- MESAJLAR (SCROLL DÜZELTİLDİ) -->
          <div id="messages" class="messages"></div>

          <form id="composer" class="composer">
            <input id="messageInput" class="input" placeholder="Mesaj yaz..." />
            <button class="btn btn--primary">Gönder</button>
          </form>

        </section>
      </main>

      <!-- SAĞ PROFİL PANELİ (YENİ EKLENDİ) -->
      <aside id="userInfoPanel" class="user-panel">
        <h3>Kullanıcı Bilgisi</h3>

        <div class="user-box">
          <img id="uiAvatar" src="https://placehold.co/80x80" />
          <div>
            <div id="uiUsername">@-</div>
            <div id="uiAge"></div>
            <div id="uiCity"></div>
          </div>
        </div>

        <p id="uiAbout"></p>
      </aside>

    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
