<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alevi Sohbet & Evlilik</title>
    <meta name="supabase-url" content="" />
    <meta name="supabase-anon-key" content="" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />

    <!-- ===================== -->
    <!-- ✅ SCROLL FIX -->
    <!-- ===================== -->
    <style>
      html, body {
        height: 100%;
        overflow: hidden;
      }

      .messages {
        overflow-y: auto;
        height: calc(100vh - 200px);
        scroll-behavior: smooth;
      }

      .chat-card {
        display: flex;
        flex-direction: column;
        height: 100%;
      }

      /* ===================== */
      /* 👤 PROFİL PANEL */
      /* ===================== */
      .user-panel {
        position: fixed;
        right: -340px;
        top: 0;
        width: 340px;
        height: 100%;
        background: #111b36;
        border-left: 1px solid #2a3865;
        padding: 16px;
        transition: 0.25s ease;
        z-index: 999;
        overflow-y: auto;
      }

      .user-panel.active {
        right: 0;
      }

      .user-panel img {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <script src="./config.js"></script>
    <script>
      window.__ALEVICHAT_CONFIG__ = window.__ALEVICHAT_CONFIG__ || {
        SUPABASE_URL: "https://pxfryssfvwdzgbkgrcud.supabase.co",
        SUPABASE_ANON_KEY: "KEY"
      };
    </script>

    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand__logo">A</div>
          <div>
            <h1>Alevi Sohbet</h1>
            <p>Evlilik & Realtime Platform</p>
          </div>
        </div>

        <section class="panel">
          <div class="panel__title">Odalar</div>
          <div id="roomList" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel__title">Kullanıcılar</div>
          <input id="userSearch" class="input" type="text" placeholder="Kullanıcı ara..." />
          <div id="userList" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel__title">Engellenenler</div>
          <div id="blockedList" class="stack"></div>
        </section>

        <section class="profile-card">
          <img id="myAvatar" class="avatar" alt="profil" src="https://placehold.co/64x64" />
          <div class="profile-card__info">
            <div id="myUsername" class="profile-card__name">@misafir</div>
            <div id="mySub" class="profile-card__sub">Giriş yapmadınız</div>
          </div>
          <button id="btnProfile" class="btn btn--ghost" type="button">Düzenle</button>
        </section>
      </aside>

      <main class="chat-shell">
        <header class="chat-header">
          <div>
            <h2 id="chatTitle"># genel-sohbet</h2>
            <p id="chatSub">Alevi topluluğu canlı sohbet</p>
          </div>
          <div class="chat-header__actions">
            <button id="btnDmInbox" class="btn btn--ghost" type="button">DM Kutusu</button>
            <span id="meBadge" class="badge">Giriş yok</span>
            <button id="btnLogout" class="btn btn--ghost" type="button">Çıkış</button>
          </div>
        </header>

        <section id="chatCard" class="chat-card hidden">
          <div id="messages" class="messages"></div>
          <form id="composer" class="composer">
            <input id="messageInput" class="input" maxlength="1000" placeholder="Mesaj yaz..." required />
            <button class="btn btn--primary" type="submit">Gönder</button>
          </form>
        </section>
      </main>
    </div>

    <!-- ===================== -->
    <!-- AUTH (AYNI) -->
    <!-- ===================== -->
    <div id="authCard" class="auth-overlay">...</div>

    <!-- ===================== -->
    <!-- USER MODAL (AYNI) -->
    <!-- ===================== -->
    <div id="userModal" class="modal hidden">...</div>

    <!-- ===================== -->
    <!-- PROFİL MODAL (AYNI) -->
    <!-- ===================== -->
    <div id="profileModal" class="modal hidden">...</div>

    <!-- ===================== -->
    <!-- 👤 SAĞ PROFİL PANEL -->
    <!-- ===================== -->
    <div id="userPanel" class="user-panel">
      <img id="upAvatar" src="https://placehold.co/80x80" />
      <h3 id="upUsername">@user</h3>
      <p id="upCity"></p>
      <p id="upAge"></p>
      <p id="upAbout"></p>

      <button id="btnClosePanel" class="btn btn--ghost">Kapat</button>
    </div>

    <script type="module" src="./app.js"></script>

    <!-- ===================== -->
    <!-- JS PANEL + SCROLL FIX -->
    <!-- ===================== -->
    <script>
      const panel = document.getElementById("userPanel");

      document.getElementById("btnClosePanel").onclick = () => {
        panel.classList.remove("active");
      };

      window.openUserPanel = (user) => {
        document.getElementById("upUsername").innerText = "@" + user.username;
        document.getElementById("upCity").innerText = user.city || "";
        document.getElementById("upAge").innerText = user.age ? user.age + " yaş" : "";
        document.getElementById("upAbout").innerText = user.about || "";
        document.getElementById("upAvatar").src = user.avatar_url || "https://placehold.co/80x80";

        panel.classList.add("active");
      };

      // =====================
      // 📜 AUTO SCROLL FIX
      // =====================
      const msgBox = document.getElementById("messages");

      const observer = new MutationObserver(() => {
        msgBox.scrollTop = msgBox.scrollHeight;
      });

      observer.observe(msgBox, { childList: true });
    </script>

  </body>
</html>
