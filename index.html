<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AleviChat Supabase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app">
      <aside class="left">
        <div class="brand">
          <div class="brand__logo">A</div>
          <div>
            <h1>AleviChat</h1>
            <p>Supabase Realtime</p>
          </div>
        </div>

        <section class="panel">
          <div class="panel__title">Odalar</div>
          <div id="roomList" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel__title">Kullanıcılar</div>
          <div class="row">
            <input id="userSearch" class="input" placeholder="Kullanıcı ara..." />
          </div>
          <div id="userList" class="stack"></div>
        </section>

        <section class="panel">
          <div class="panel__title">Engellediklerim</div>
          <div id="blockedList" class="stack"></div>
        </section>
      </aside>

      <main class="main">
        <header class="top">
          <div>
            <div id="chatTitle" class="title"># genel</div>
            <div id="chatSub" class="muted">Oda sohbeti</div>
          </div>
          <div class="top__actions">
            <button id="btnProfile" class="btn btn--ghost" type="button">Profil</button>
            <button id="btnDmInbox" class="btn btn--ghost" type="button">DM</button>
            <span id="meBadge" class="badge">Giriş yok</span>
            <button id="btnLogout" class="btn btn--ghost" type="button">Çıkış</button>
          </div>
        </header>

        <section id="authCard" class="auth">
          <form id="authForm" class="auth__box">
            <h2>Giriş / Kayıt</h2>
            <input id="authEmail" class="input" type="email" placeholder="Email" required />
            <input id="authPassword" class="input" type="password" placeholder="Şifre" minlength="6" required />
            <input id="authUsername" class="input" type="text" placeholder="Kullanıcı adı (kayıt için)" />
            <div class="row row--end">
              <button id="btnLogin" class="btn" type="submit">Giriş Yap</button>
              <button id="btnSignup" class="btn btn--ghost" type="submit">Kayıt Ol</button>
            </div>
            <p id="authNote" class="note"></p>
          </form>
        </section>

        <section id="chatCard" class="chat hidden">
          <div id="messages" class="messages"></div>
          <form id="composer" class="composer">
            <input id="messageInput" class="input" maxlength="1000" placeholder="Mesaj yaz..." required />
            <button class="btn" type="submit">Gönder</button>
          </form>
        </section>
      </main>
    </div>

    <div id="userModal" class="modal hidden">
      <div class="modal__box">
        <div class="modal__head">
          <strong id="umTitle">@kullanici</strong>
          <button id="btnCloseUserModal" class="btn btn--ghost" type="button">Kapat</button>
        </div>
        <div class="stack">
          <button id="btnStartDm" class="btn" type="button">DM Başlat</button>
          <button id="btnBlockUser" class="btn btn--ghost" type="button">Engelle</button>
          <button id="btnUnblockUser" class="btn btn--ghost" type="button">Engeli Kaldır</button>
          <button id="btnReportUser" class="btn btn--ghost" type="button">Raporla</button>
          <p id="umNote" class="note"></p>
        </div>
      </div>
    </div>

    <div id="profileModal" class="modal hidden">
      <div class="modal__box">
        <div class="modal__head">
          <strong>Profil</strong>
          <button id="btnCloseProfile" class="btn btn--ghost" type="button">Kapat</button>
        </div>
        <form id="profileForm" class="stack">
          <input id="pfUsername" class="input" required maxlength="40" placeholder="Kullanıcı adı" />
          <input id="pfCity" class="input" maxlength="80" placeholder="Şehir" />
          <textarea id="pfAbout" class="input" rows="4" maxlength="280" placeholder="Hakkında"></textarea>
          <div class="row row--end">
            <button class="btn" type="submit">Kaydet</button>
          </div>
          <p id="pfNote" class="note"></p>
        </form>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
